<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>おてつだい手帳 - こどもアプリ</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f0a2e">
  <link rel="icon" href="icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Rounded+Mplus+1c:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/child.css">
</head>
<body>

  <!-- ========== セットアップ画面 ========== -->
  <div id="setupScreen" class="setup-screen" style="display:none;">
    <div class="logo" style="font-size:4rem;margin-bottom:16px;">⭐</div>
    <h1 class="setup-title">なまえをおしえてね！</h1>
    <p class="setup-subtitle">アバターをえらんで、なまえを入れよう</p>

    <div class="avatar-picker" id="avatarPicker"></div>

    <input type="text" class="setup-input" id="setupName" placeholder="なまえ" maxlength="10">

    <button class="btn btn-primary btn-block" style="margin-top:24px;max-width:280px;" onclick="completeSetup()">
      はじめる！ 🚀
    </button>
  </div>

  <!-- ========== メインアプリ ========== -->
  <div id="appScreen" style="display:none;">

    <!-- ヘッダー -->
    <header class="app-header">
      <h1>⭐ おてつだい手帳</h1>
      <button class="header-btn" onclick="showTab('settings')" title="設定">⚙️</button>
    </header>

    <!-- ========== タブ：ホーム ========== -->
    <main class="main-content" id="tab-home">

      <!-- プロフィール -->
      <section class="profile-section">
        <div class="avatar-large" id="avatarDisplay"></div>
        <div class="child-username" id="childNameDisplay"></div>
        <div class="level-badge" id="levelBadge"></div>
      </section>

      <!-- 残高カード -->
      <section class="balance-card">
        <div class="balance-label">💰 もっているおかね</div>
        <div class="balance-amount">
          <span id="balanceDisplay">0</span><span class="balance-unit">円</span>
        </div>
        <div class="exp-bar-container">
          <div class="exp-bar-bg">
            <div class="exp-bar-fill" id="expBarFill" style="width:0%"></div>
          </div>
          <div class="exp-bar-text">
            <span id="expCurrent"></span>
            <span id="expNext"></span>
          </div>
        </div>
      </section>

      <!-- QR読み取りボタン -->
      <button class="btn scan-btn btn-block" onclick="openScanRewardModal()">
        <span class="btn-emoji">📷</span> ごほうびQRをよみとる
      </button>

      <!-- 最近のりれき -->
      <section class="history-section">
        <h2>📜 さいきんのりれき</h2>
        <div id="recentHistory"></div>
      </section>

    </main>

    <!-- ========== タブ：りれき ========== -->
    <main class="main-content" id="tab-history" style="display:none;">
      <h2 class="history-section" style="margin-bottom:16px;">
        <span style="font-size:0.85rem;color:var(--c-text-sub);text-transform:uppercase;letter-spacing:0.1em;">📜 ぜんぶのりれき</span>
      </h2>
      <div id="fullHistory"></div>
    </main>

    <!-- ========== タブ：マイQR ========== -->
    <main class="main-content" id="tab-myqr" style="display:none;">
      <section class="my-qr-section">
        <h3>📱 わたしのQRコード</h3>
        <p style="font-size:0.8rem;color:var(--c-text-sub);margin-bottom:16px;">おとうさん・おかあさんにこのQRをよんでもらおう</p>
        <div class="qr-display" id="myQRDisplay"></div>
        <p style="font-size:0.75rem;color:var(--c-text-sub);margin-top:12px;" id="myIdDisplay"></p>
      </section>
    </main>

    <!-- ========== タブ：設定 ========== -->
    <main class="main-content" id="tab-settings" style="display:none;">
      <h2 style="font-size:0.85rem;color:var(--c-text-sub);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:16px;">⚙️ 設定</h2>

      <div class="card" style="background:var(--c-surface);border:1px solid var(--c-border);margin-bottom:16px;">
        <p style="font-size:0.85rem;color:var(--c-text-sub);margin-bottom:4px;">なまえ</p>
        <p style="font-weight:700;font-size:1.1rem;" id="settingsName"></p>
      </div>

      <div class="card" style="background:var(--c-surface);border:1px solid var(--c-border);margin-bottom:16px;">
        <p style="font-size:0.85rem;color:var(--c-text-sub);margin-bottom:4px;">レベル</p>
        <p style="font-weight:700;font-size:1.1rem;" id="settingsLevel"></p>
      </div>

      <div class="card" style="background:var(--c-surface);border:1px solid var(--c-border);margin-bottom:16px;">
        <p style="font-size:0.85rem;color:var(--c-text-sub);margin-bottom:4px;">おやとの接続</p>
        <p style="font-weight:700;font-size:1.1rem;" id="settingsParent"></p>
      </div>

      <button class="btn btn-block" style="background:rgba(239,68,68,0.15);color:#ef4444;margin-top:24px;" onclick="confirmReset()">
        🗑️ データをすべて削除
      </button>

      <div style="text-align:center;margin-top:24px;">
        <a href="index.html" style="color:var(--c-text-sub);font-size:0.85rem;">トップに戻る</a>
      </div>
    </main>

    <!-- タブナビ -->
    <nav class="tab-nav">
      <button class="tab-item active" onclick="showTab('home')" id="tabHome">
        <span class="tab-icon">🏠</span> ホーム
      </button>
      <button class="tab-item" onclick="showTab('history')" id="tabHistory">
        <span class="tab-icon">📜</span> りれき
      </button>
      <button class="tab-item" onclick="showTab('myqr')" id="tabMyqr">
        <span class="tab-icon">📱</span> マイQR
      </button>
      <button class="tab-item" onclick="showTab('settings')" id="tabSettings">
        <span class="tab-icon">⚙️</span> 設定
      </button>
    </nav>
  </div>

  <!-- ========== モーダル：QRスキャン ========== -->
  <div class="modal-overlay" id="scanRewardModal">
    <div class="modal">
      <h2>📷 ごほうびQRをよみとろう</h2>
      <div id="scanRewardReader"></div>
      <button class="btn btn-secondary btn-block" style="margin-top:12px;" onclick="closeScanRewardModal()">キャンセル</button>
    </div>
  </div>

  <!-- ========== モーダル：受取成功 ========== -->
  <div class="modal-overlay" id="receiveSuccessModal">
    <div class="modal receive-success">
      <div style="font-size:3rem;">🎉</div>
      <h2>ごほうびゲット！</h2>
      <div class="receive-chore-name" id="receiveChore"></div>
      <div class="receive-amount-display" id="receiveAmount"></div>
      <button class="btn btn-primary btn-block" style="margin-top:16px;" onclick="closeReceiveSuccess()">やったー！ 🙌</button>
    </div>
  </div>

  <!-- トースト -->
  <div class="toast" id="toast"></div>

  <!-- CDN Libraries (複数ソースでフォールバック) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    if (typeof QRCode === 'undefined') {
      document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"><\/script>');
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <!-- App Scripts -->
  <script src="js/crypto.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/qr.js"></script>
  <script src="js/confetti.js"></script>
  <script src="js/child.js"></script>
</body>
</html>
